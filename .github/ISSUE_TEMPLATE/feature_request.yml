name: Feature Request
description: Suggest a new tool, improvement, or change
labels: ['enhancement']
assignees: ['beelzer']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed? If it's a new tool or mode, what does it do?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why would this be useful? What problem does it solve? Is there a privacy-respecting alternative that doesn't already exist?
    validations:
      required: false

  - type: checkboxes
    id: feasibility
    attributes:
      label: In-browser feasibility check
      description: Every tool here runs entirely in the browser. Tick what applies.
      options:
        - label: A pure-JS library exists for this operation (e.g. on npm)
        - label: A WASM port exists (e.g. for native libraries like libheif, ffmpeg)
        - label: Browser Canvas / WebCodecs / File System Access APIs are sufficient
        - label: Not sure — please assess
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, examples from other sites, links to libraries, or any other details.
    validations:
      required: false
